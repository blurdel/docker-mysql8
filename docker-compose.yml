version: '3'
services:
  mysql8:
    container_name: mysql840
    image: mysql:8.4.0
    volumes:
      - /home/david/dockerdata/mysql840:/var/lib/mysql
    restart: on-failure:2
    environment:
      - MYSQL_ROOT_PASSWORD=geometry
      - MYSQL_DATABASE=SPRING
      - MYSQL_USER=tmuser
      - MYSQL_PASSWORD=tmuser
    ports:
      - 3306:3306
